x-healthcheck-defaults: &healthcheck-defaults
  interval: 30s
  timeout: 5s
  retries: 3
  start_period: 5s

services:
  backend:
    build:
      context: ./backend
    image: digital-chintu-backend:local
    environment:
      APP_NAME: ${APP_NAME:-Chintu}
      APP_ENV: ${APP_ENV:-production}
      DEBUG: ${DEBUG:-false}
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
      LOG_DIR: /app/logs
      CORS_ORIGINS: ${CORS_ORIGINS:-http://localhost:5173}
      DATABASE_URL: sqlite:////app/data/chintu.db
      DEFAULT_THEME: ${DEFAULT_THEME:-system}
      DEFAULT_LANGUAGE: ${DEFAULT_LANGUAGE:-en-US}
      PLUGINS_DIR: /app/plugins
      ENABLED_PLUGINS: ${ENABLED_PLUGINS:-}
      # WAKE_WORD deliberately isn't listed here: it's optional (see
      # backend/app/core/config.py) and Compose can't distinguish "unset" from
      # "set to empty string" once a key is listed under `environment:` — an
      # operator who wants to pin an exact phrase in Docker should add
      # `WAKE_WORD: ${WAKE_WORD}` via a docker-compose.override.yml. Left
      # unset, it derives "Hey {APP_NAME}", same as native dev.
      WAKE_WORD_MODEL: ${WAKE_WORD_MODEL:-hey_jarvis}
      WAKE_WORD_SENSITIVITY: ${WAKE_WORD_SENSITIVITY:-0.5}
      WAKE_WORD_PREROLL_SECONDS: ${WAKE_WORD_PREROLL_SECONDS:-1.0}
      VOICE_AUDIO_DEVICE: ${VOICE_AUDIO_DEVICE:-}
      STT_MODEL: ${STT_MODEL:-tiny.en}
      STT_UTTERANCE_SECONDS: ${STT_UTTERANCE_SECONDS:-5.0}
    volumes:
      - backend-data:/app/data
      - backend-logs:/app/logs
      # Bind mount (not a named volume): plugins are host-authored files an
      # operator drops in, not container-owned state — see
      # docs/architecture/05_PLUGIN_SDK.md's "Cross-platform / Docker".
      - ./plugins:/app/plugins:ro
    ports:
      - "${BACKEND_PORT:-8000}:8000"
    restart: unless-stopped
    # Conservative fixed limits so this doesn't starve the other container on
    # a memory-constrained Raspberry Pi. Edit directly if your device needs
    # different values — not templated via .env: older Docker Compose
    # releases (confirmed on v2.2.3, plausible on Raspberry Pi OS's default
    # package) mis-parse a memory-unit string ("512m") when it comes through
    # ${VAR:-default} substitution instead of a YAML literal.
    mem_limit: 512m
    # Verified enforced (docker inspect: HostConfig.Memory=536870912) on
    # Docker Engine 20.10 / Compose 2.2. `cpus` below is valid Compose Spec
    # syntax but wasn't enforced by that same engine/compose combo
    # (HostConfig.CpuQuota stayed 0) — likely needs a newer Docker Engine.
    # Keep it; it costs nothing on engines where it's a no-op.
    cpus: 1.0
    healthcheck:
      <<: *healthcheck-defaults
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/api/v1/health')"]

  frontend-dashboard:
    build:
      context: ./frontend-dashboard
      args:
        VITE_API_BASE_URL: ${VITE_API_BASE_URL:-http://localhost:8000}
    image: digital-chintu-frontend-dashboard:local
    ports:
      - "${FRONTEND_PORT:-5173}:80"
    depends_on:
      backend:
        condition: service_healthy
    restart: unless-stopped
    mem_limit: 128m
    cpus: 0.5
    healthcheck:
      <<: *healthcheck-defaults
      test: ["CMD", "wget", "--spider", "-q", "http://localhost/"]

volumes:
  backend-data:
  backend-logs:
